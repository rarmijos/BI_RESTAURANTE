services:
  mysql:
    image: mysql:8.4
    container_name: bi_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: restaurante_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro

  postgres:
    image: postgres:16
    container_name: bi_postgres
    environment:
      POSTGRES_DB: restaurante_gestion
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5444:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro

  staging:
    image: postgres:16
    container_name: staging
    environment:
      POSTGRES_DB: datawarehouse
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5450:5432"
    volumes:
      - dw_data:/var/lib/postgresql/data
      - ./datawarehouse-init:/docker-entrypoint-initdb.d:ro

  adminer:
    image: adminer:latest
    container_name: adminer
    restart: always
    ports:
      - "8090:8080"

  rstudio:
    build:
      context: ./rstudio
    container_name: bi_rstudio
    environment:
      PASSWORD: rstudio123
      DW_HOST: staging
      DW_PORT: 5432
      DW_DATABASE: datawarehouse
      DW_USER: root
      DW_PASSWORD: root
    ports:
      - "8787:8787"
    volumes:
      - ./rstudio/proyecto:/home/rstudio/proyecto
    depends_on:
      - staging
    restart: unless-stopped

volumes:
  mysql_data:
  postgres_data:
  dw_data:
